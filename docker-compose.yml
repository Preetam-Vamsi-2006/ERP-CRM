version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: erp_crm_db
    environment:
      POSTGRES_DB: erp_crm
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-build
    container_name: erp_crm_backend
    environment:
      DATABASE_URL: postgresql://erp_user:erp_password@postgres:5432/erp_crm
      JWT_SECRET: test_jwt_secret_change_in_prod
      NODE_ENV: development
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    volumes:
      - ./backend/src:/app/backend/src

  frontend:
    image: node:18-alpine
    container_name: erp_crm_frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
